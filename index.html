<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graham Harrell — hrrll</title>
  <link rel="icon" type="image/svg+xml" href="g-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0b0b0d;
      --bg-2:         #0f0f12;
      --surface:      #131318;
      --border:       rgba(238, 234, 228, 0.08);
      --border-strong:rgba(238, 234, 228, 0.16);
      --text:         #eeeae4;
      --text-soft:    #b9b3a9;
      --text-muted:   #6b6b72;
      --text-faint:   #3d3d44;
      --accent:       #c9a96e;
      --accent-soft:  rgba(201, 169, 110, 0.55);
      --accent-dim:   rgba(201, 169, 110, 0.10);
      --accent-line:  rgba(201, 169, 110, 0.22);
    }

    html { font-size: 16px; }
    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Background texture layers ── */
    .bg-tex { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    /* clean: subtle noise + vignette only */
    .bg-clean::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 38%, rgba(255,255,255,0.018), transparent 70%),
        radial-gradient(ellipse 100% 80% at 50% 100%, rgba(0,0,0,0.4), transparent 60%);
    }

    /* hatch: diagonal accent lines */
    .bg-hatch {
      background-image: repeating-linear-gradient(
        -45deg,
        rgba(201, 169, 110, 0.025) 0px,
        rgba(201, 169, 110, 0.025) 1px,
        transparent 1px,
        transparent 28px
      );
    }

    /* mountains: ridges at bottom */
    .bg-mountains svg {
      position: absolute; bottom: 0; left: 0; right: 0; width: 100%;
    }

    /* starfield: small twinkling dots */
    .bg-stars { background: radial-gradient(ellipse 100% 80% at 50% 0%, #0e0e12 0%, var(--bg) 70%); }
    .bg-stars .star {
      position: absolute;
      width: 1px; height: 1px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d, 4s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--max, 0.45); }
    }

    /* grid: faint blueprint */
    .bg-grid {
      background-image:
        linear-gradient(rgba(201,169,110,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,169,110,0.035) 1px, transparent 1px);
      background-size: 56px 56px;
    }

    /* shared vignette over textures */
    .bg-vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: radial-gradient(ellipse 820px 720px at 50% 42%, rgba(11,11,13,0.55) 0%, transparent 75%);
    }

    /* Top accent bar */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 10%, var(--accent-soft) 50%, transparent 90%);
      opacity: 0.7;
      z-index: 5;
    }

    /* ── Stage (single screen) ── */
    .stage {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      width: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 22px 36px 18px;
    }

    /* ── Top frame: monogram + meta ── */
    .top-frame {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
    }

    .g-mark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.85rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      line-height: 1;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--accent-line);
      cursor: pointer;
      user-select: none;
      transition: border-color 0.3s ease, transform 0.4s cubic-bezier(.2,.7,.2,1);
    }
    .g-mark:hover { border-color: var(--accent-soft); transform: rotate(-4deg); }

    .meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .meta .accent { color: var(--accent); opacity: 0.85; }
    .meta .live { display: inline-flex; align-items: center; gap: 6px; }
    .meta .live::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-soft);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ── Center column ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      gap: 0;
    }

    /* Wordmark */
    .wordmark { text-align: center; }
    .wordmark h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 7.5vw, 5.5rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 0.95;
      white-space: nowrap;
    }
    .wordmark h1 .space { display: inline-block; width: 0.35em; }
    .wordmark h1 .amp {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
      padding: 0 0.05em;
      font-size: 0.85em;
      vertical-align: 0.04em;
    }
    .wordmark .role {
      margin-top: 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .wordmark .role .dot { color: var(--text-faint); padding: 0 0.6em; }

    /* Bio */
    .bio {
      margin-top: 22px;
      max-width: 580px;
      text-align: center;
    }
    .bio p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 300;
      line-height: 1.5;
      color: var(--text-soft);
      letter-spacing: 0.005em;
    }
    .bio p em { color: var(--accent); font-style: italic; font-weight: 400; }

    /* Three-column info strip: WORK · NOW · LINKS */
    .strip {
      margin-top: 32px;
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 1.1fr 1px 1fr 1px 1.1fr;
      gap: 28px;
      align-items: stretch;
    }
    .strip .vsep {
      background: linear-gradient(to bottom, transparent, var(--border-strong) 20%, var(--border-strong) 80%, transparent);
    }

    .col-head {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.8;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .col-head .num {
      color: var(--text-faint);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
    }

    /* Work column */
    .work-list { display: flex; flex-direction: column; gap: 10px; }
    .work-item .work-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .work-item .work-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      line-height: 1.5;
      color: var(--text-soft);
      font-weight: 300;
    }
    .work-item .work-text strong {
      color: var(--text);
      font-weight: 400;
      font-style: italic;
    }

    /* Now column */
    .now-list { display: flex; flex-direction: column; gap: 9px; }
    .now-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 12px;
      align-items: baseline;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--border);
    }
    .now-row:last-child { border-bottom: none; padding-bottom: 0; }
    .now-key {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .now-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      line-height: 1.4;
      color: var(--text-soft);
    }
    .now-val em { color: var(--accent); font-style: italic; font-weight: 400; }
    .now-val .by { color: var(--text-muted); font-size: 0.85em; font-style: italic; }

    /* Links column */
    .links { display: flex; flex-direction: column; gap: 6px; }
    .link-row {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 9px 4px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 400;
      transition: padding 0.25s cubic-bezier(.2,.7,.2,1), color 0.2s;
      position: relative;
    }
    .link-row:last-child { border-bottom: none; }
    .link-row .icon {
      width: 14px; height: 14px;
      color: var(--accent);
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.3s cubic-bezier(.2,.7,.2,1);
    }
    .link-row .icon svg { width: 100%; height: 100%; display: block; }
    .link-row .arrow {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.25s, transform 0.3s cubic-bezier(.2,.7,.2,1);
      font-size: 0.8rem;
    }
    .link-row:hover { padding-left: 10px; color: var(--accent); }
    .link-row:hover .icon { opacity: 1; transform: translateX(2px); }
    .link-row:hover .arrow { opacity: 1; transform: translateX(0); }

    /* ── Footer frame ── */
    .footer-frame {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .footer-frame .left { color: var(--accent); opacity: 0.55; }
    .footer-frame a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-frame a:hover { color: var(--accent); }

    /* ── Login dropdown (in contact column) ── */
    .login-row {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 9px 4px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.64rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 400;
      cursor: default;
      user-select: none;
      transition: color 0.2s;
    }
    .login-row:last-child { border-bottom: none; }
    .login-row .icon { width: 14px; height: 14px; color: var(--accent); opacity: 0.7; }
    .login-row .icon svg { width: 100%; height: 100%; display: block; }
    .login-row .arrow {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      font-size: 0.8rem;
      transition: transform 0.2s;
    }
    .login-row:hover { color: var(--accent); }
    .login-row:hover .icon { opacity: 1; }
    .login-row.open .arrow { transform: rotate(90deg); }

    .login-submenu {
      display: none;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
      margin: 0;
    }
    .login-submenu.open { display: flex; }
    .login-submenu a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px 8px 34px;
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-top: 1px solid var(--border);
      transition: color 0.15s;
    }
    .login-submenu a:hover { color: var(--accent); }
    .login-submenu a .dom { font-size: 0.5rem; opacity: 0.4; }

    /* Confetti easter egg */
    .confetti-g {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-family: 'Cormorant Garamond', serif;
      color: var(--accent);
      font-weight: 300;
      will-change: transform, opacity;
    }

    /* Initial fade in */
    .fade-in { opacity: 0; animation: fadeIn 1.1s ease forwards; }
    .fade-in.d1 { animation-delay: 0.1s; }
    .fade-in.d2 { animation-delay: 0.25s; }
    .fade-in.d3 { animation-delay: 0.4s; }
    .fade-in.d4 { animation-delay: 0.55s; }
    .fade-in.d5 { animation-delay: 0.7s; }
    .fade-in.d6 { animation-delay: 0.85s; }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ── Tablet (≤ 880px) ── */
    @media (max-width: 880px) {
      body { overflow: auto; }
      .stage { padding: 20px 24px 24px; }
      .strip {
        grid-template-columns: 1fr;
        gap: 28px;
        margin-top: 28px;
      }
      .strip .vsep { display: none; }
      .wordmark h1 {
        font-size: clamp(2.6rem, 10vw, 4rem);
        white-space: normal;
      }
    }

    /* ── Phone (≤ 480px) ── */
    @media (max-width: 480px) {
      .stage {
        padding: 16px 18px 28px;
        grid-template-rows: auto auto auto;
        min-height: 100dvh;
      }
      .g-mark { width: 38px; height: 38px; font-size: 1.6rem; }
      .meta { font-size: 0.52rem; letter-spacing: 0.16em; gap: 3px; }
      .meta .live::before { width: 4px; height: 4px; }
      .wordmark h1 {
        font-size: clamp(2.4rem, 13vw, 3.2rem);
        letter-spacing: 0.06em;
        white-space: normal;
      }
      .wordmark .role {
        font-size: 0.55rem;
        letter-spacing: 0.28em;
        margin-top: 10px;
      }
      .bio { margin-top: 16px; }
      .bio p { font-size: 1.1rem; }
      .strip { margin-top: 24px; gap: 24px; }
      .col-head { font-size: 0.6rem; margin-bottom: 10px; }
      .work-item .work-label { font-size: 0.58rem; }
      .work-item .work-text { font-size: 1rem; }
      .now-key { font-size: 0.58rem; }
      .now-val { font-size: 1rem; }
      .link-row { font-size: 0.68rem; letter-spacing: 0.14em; padding: 10px 4px; }
      .login-row { font-size: 0.68rem; letter-spacing: 0.14em; padding: 10px 4px; }
      .login-submenu a { font-size: 0.6rem; padding: 9px 4px 9px 30px; }
      .footer-frame {
        flex-direction: column;
        gap: 4px;
        align-items: flex-start;
        font-size: 0.48rem;
      }
    }

    /* Tweaks panel dark override (inherits from starter, but we want a dark variant) */
    .twk-panel {
      background: rgba(20, 20, 24, 0.85) !important;
      color: var(--text) !important;
      border-color: var(--border-strong) !important;
    }
    .twk-panel .twk-x { color: var(--text-muted) !important; }
    .twk-panel .twk-x:hover { background: rgba(255,255,255,0.06) !important; color: var(--text) !important; }
    .twk-panel .twk-lbl { color: var(--text-soft) !important; }
    .twk-panel .twk-val { color: var(--text-muted) !important; }
    .twk-panel .twk-sect { color: var(--accent) !important; opacity: 0.85; }
    .twk-panel .twk-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15) !important; }
  </style>
</head>
<body>

  <div class="top-bar"></div>
  <div id="bg-host"></div>
  <div class="bg-vignette"></div>

  <main class="stage">

    <!-- Top frame -->
    <header class="top-frame">
      <div class="g-mark fade-in d1" id="g-mark" title="Click me" aria-label="G monogram">G</div>
      <div class="meta fade-in d1">
        <div><span class="accent">N° 26 </span>· est. 2016</div>
        <div class="live"><span id="local-time">— : —</span> · CHATTANOOGA, TN</div>
      </div>
    </header>

    <!-- Center -->
    <section class="center">
      <div class="wordmark fade-in d2">
        <h1>Graham<span class="space">&nbsp;</span>Harrell</h1>
        <div class="role" id="role-line"></div>
      </div>

      <div class="bio fade-in d3">
        <p id="bio-line"></p>
      </div>

      <div class="strip">
        <!-- Work column -->
        <div class="col fade-in d4">
          <div class="col-head"><span>Work</span><span class="num">01</span></div>
          <div class="work-list" id="work-list"></div>
        </div>

        <div class="vsep"></div>

        <!-- Now column -->
        <div class="col fade-in d5">
          <div class="col-head"><span>Now</span><span class="num">02</span></div>
          <div class="now-list" id="now-list"></div>
        </div>

        <div class="vsep"></div>

        <!-- Links column -->
        <div class="col fade-in d6">
          <div class="col-head"><span>Contact</span><span class="num">03</span></div>
          <div class="links" id="links-list"></div>
        </div>
      </div>
    </section>

    <!-- Footer frame -->
    <footer class="footer-frame fade-in d6">
      <div class="left">© hrrll · MMXXVI</div>
      <div class="right"><a href="mailto:graham@hrrll.com">graham@hrrll.com</a></div>
    </footer>
  </main>


  <!-- Tweaks mount -->
  <div id="tweaks-root"></div>

  <script src="content.js"></script>
  <script>
    /* ── Render content from content.js ── */
    (function renderContent() {
      document.getElementById('role-line').innerHTML = CONTENT.role;
      document.getElementById('bio-line').innerHTML  = CONTENT.bio;

      const workEl = document.getElementById('work-list');
      workEl.innerHTML = CONTENT.work.map(w => `
        <div class="work-item">
          <div class="work-label">${w.label}</div>
          <div class="work-text">${w.text}</div>
        </div>`).join('');

      const nowEl = document.getElementById('now-list');
      nowEl.innerHTML = CONTENT.now.map(n => `
        <div class="now-row">
          <div class="now-key">${n.key}</div>
          <div class="now-val">${n.val}</div>
        </div>`).join('');

      const ICONS = {
        email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5" width="19" height="14" rx="1"/><polyline points="2.5,5.5 12,13 21.5,5.5"/></svg>',
        linkedin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>',
        github: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>',
        calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="1.5"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2.5" x2="8" y2="6"/><line x1="16" y1="2.5" x2="16" y2="6"/></svg>'
      };
      const l = CONTENT.links;
      const linkRows = [
        { href: 'mailto:' + l.email, icon: ICONS.email,    label: l.email,       arrow: '→', external: false },
        { href: l.linkedin,          icon: ICONS.linkedin, label: 'LinkedIn',    arrow: '↗', external: true  },
        { href: l.github,            icon: ICONS.github,   label: 'GitHub',      arrow: '↗', external: true  },
        { href: l.calendar,          icon: ICONS.calendar, label: 'Book 30 min', arrow: '↗', external: true  }
      ];
      document.getElementById('links-list').innerHTML = linkRows.map(r => `
        <a class="link-row" href="${r.href}"${r.external ? ' target="_blank" rel="noopener noreferrer"' : ''}>
          <span class="icon">${r.icon}</span>
          <span>${r.label}</span>
          <span class="arrow">${r.arrow}</span>
        </a>`).join('');

      const loginIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>';
      const loginRow = document.createElement('div');
      loginRow.className = 'login-row';
      loginRow.innerHTML = `<span class="icon">${loginIcon}</span><span>Login</span><span class="arrow">›</span>`;
      const submenu = document.createElement('div');
      submenu.className = 'login-submenu';
      submenu.innerHTML = `
        <a href="https://homerun.hrrll.com" target="_blank" rel="noopener noreferrer">
          <span>Home Run</span><span class="dom">homerun.hrrll.com</span>
        </a>
        <a href="https://meals.hrrll.com" target="_blank" rel="noopener noreferrer">
          <span>Meals</span><span class="dom">meals.hrrll.com</span>
        </a>`;
      loginRow.addEventListener('click', function() {
        loginRow.classList.toggle('open');
        submenu.classList.toggle('open');
      });
      const linksEl = document.getElementById('links-list');
      linksEl.appendChild(loginRow);
      linksEl.appendChild(submenu);

      document.querySelector('.footer-frame .left').textContent = CONTENT.footer;
      const footerEmail = document.querySelector('.footer-frame .right a');
      footerEmail.textContent = l.email;
      footerEmail.href = 'mailto:' + l.email;
    })();
  </script>

  <script>
    /* ── Live time in Chattanooga (America/New_York) ── */
    function updateTime() {
      const now = new Date();
      const fmt = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        hour: '2-digit', minute: '2-digit', hour12: false
      }).format(now);
      const el = document.getElementById('local-time');
      if (el) el.textContent = fmt + ' EST';
    }
    updateTime();
    setInterval(updateTime, 30 * 1000);

    /* ── Easter egg 1: G monogram glyph cycle on click ── */
    (function() {
      var g = document.getElementById('g-mark');
      var glyphs = ['G', 'g', 'ɢ', 'Ǥ', 'Ḡ', '𝒢', 'G'];
      var i = 0;
      g.addEventListener('click', function() {
        i = (i + 1) % glyphs.length;
        g.style.transform = 'rotate(-12deg) scale(1.08)';
        g.textContent = glyphs[i];
        setTimeout(function() { g.style.transform = ''; }, 280);
      });
    })();

    /* ── Easter egg 2: type "hrrll" → open tweaks panel ── */
    (function() {
      var word = 'hrrll', pos = 0;
      window.addEventListener('keydown', function(e) {
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        var k = e.key.toLowerCase();
        if (k === word[pos]) {
          pos++;
          if (pos === word.length) {
            pos = 0;
            window.dispatchEvent(new MessageEvent('message', { data: { type: '__activate_edit_mode' } }));
          }
        } else {
          pos = (k === word[0]) ? 1 : 0;
        }
      });
    })();

    /* ── Easter egg 3: Konami → confetti rain of G's ── */
    (function() {
      var seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
      var pos = 0;
      window.addEventListener('keydown', function(e) {
        var k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        if (k === seq[pos]) {
          pos++;
          if (pos === seq.length) { pos = 0; rainG(); }
        } else {
          pos = (k === seq[0]) ? 1 : 0;
        }
      });
      function rainG() {
        for (var i = 0; i < 60; i++) {
          (function(idx) {
            var el = document.createElement('div');
            el.className = 'confetti-g';
            el.textContent = 'G';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = '-40px';
            el.style.fontSize = (16 + Math.random() * 28) + 'px';
            el.style.opacity = (0.4 + Math.random() * 0.5).toFixed(2);
            document.body.appendChild(el);
            var dur = 2200 + Math.random() * 1800;
            var rot = (Math.random() * 720 - 360);
            var dx = (Math.random() * 200 - 100);
            el.animate([
              { transform: 'translate(0,0) rotate(0deg)', opacity: el.style.opacity },
              { transform: 'translate(' + dx + 'px, 110vh) rotate(' + rot + 'deg)', opacity: 0 }
            ], { duration: dur, easing: 'cubic-bezier(.2,.7,.2,1)', delay: idx * 18 });
            setTimeout(function() { el.remove(); }, dur + idx * 18 + 100);
          })(i);
        }
      }
    })();
  </script>

  <!-- Tweaks -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#7a8a6e",
      "texture": "hatch"
    }/*EDITMODE-END*/;

    const ACCENTS = [
      "#c9a96e", // gold (default)
      "#a89a7a", // bone / champagne
      "#8a3324", // oxblood
      "#7a8a6e", // sage
      "#9aa8b8", // ice / steel
      "#d97757"  // copper
    ];

    const TEXTURES = ['clean', 'hatch', 'mountains', 'starfield', 'grid'];

    function hexToRgba(hex, a) {
      const h = hex.replace('#','');
      const r = parseInt(h.substr(0,2),16);
      const g = parseInt(h.substr(2,2),16);
      const b = parseInt(h.substr(4,2),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function applyAccent(color) {
      const root = document.documentElement;
      root.style.setProperty('--accent', color);
      root.style.setProperty('--accent-soft', hexToRgba(color, 0.55));
      root.style.setProperty('--accent-dim',  hexToRgba(color, 0.10));
      root.style.setProperty('--accent-line', hexToRgba(color, 0.22));
    }

    function applyTexture(name) {
      const host = document.getElementById('bg-host');
      host.innerHTML = '';
      const layer = document.createElement('div');
      layer.className = 'bg-tex bg-' + name;

      if (name === 'mountains') {
        layer.innerHTML = `
          <svg viewBox="0 0 1440 240" preserveAspectRatio="xMidYMax slice">
            <path d="M0,148 C90,132 180,118 270,112 C360,106 450,122 540,114 C630,106 720,90 810,84 C900,78 990,86 1080,78 C1170,70 1260,76 1350,86 C1395,91 1420,96 1440,94 L1440,240 L0,240 Z"
                  fill="${hexToRgba(getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(), 0.04)}"/>
            <path d="M0,192 C90,176 180,166 270,173 C360,180 450,165 540,170 C630,175 720,160 810,156 C900,152 990,160 1080,155 C1170,150 1260,158 1350,168 C1395,173 1420,178 1440,175 L1440,240 L0,240 Z"
                  fill="${hexToRgba(getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(), 0.06)}"/>
          </svg>`;
      }

      if (name === 'starfield') {
        const frag = document.createDocumentFragment();
        for (let i = 0; i < 80; i++) {
          const s = document.createElement('div');
          s.className = 'star';
          s.style.left = (Math.random() * 100) + '%';
          s.style.top  = (Math.random() * 100) + '%';
          s.style.setProperty('--d', (3 + Math.random() * 5).toFixed(1) + 's');
          s.style.setProperty('--delay', (Math.random() * 5).toFixed(1) + 's');
          s.style.setProperty('--max', (0.25 + Math.random() * 0.5).toFixed(2));
          if (Math.random() > 0.85) {
            s.style.width = '2px';
            s.style.height = '2px';
          }
          frag.appendChild(s);
        }
        layer.appendChild(frag);
      }

      host.appendChild(layer);
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => { applyAccent(t.accent); }, [t.accent]);
      React.useEffect(() => { applyTexture(t.texture); }, [t.texture, t.accent]);

      return (
        <TweaksPanel title="Tweaks">
          <TweakSection label="Accent" />
          <TweakColor
            label="Color"
            value={t.accent}
            options={ACCENTS}
            onChange={(v) => setTweak('accent', v)}
          />
          <TweakSection label="Background" />
          <TweakSelect
            label="Texture"
            value={t.texture}
            options={TEXTURES}
            onChange={(v) => setTweak('texture', v)}
          />
        </TweaksPanel>
      );
    }

    /* Initial paint: read defaults so the first frame matches even before React mounts */
    applyAccent(TWEAK_DEFAULTS.accent);
    applyTexture(TWEAK_DEFAULTS.texture);

    ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<App />);
  </script>

</body>
