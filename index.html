<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graham Harrell</title>
  <link rel="icon" type="image/svg+xml" href="g-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=IBM+Plex+Mono:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0c0c0e;
      --surface:      #131318;
      --border:       #1e1e24;
      --text:         #eeeae4;
      --text-muted:   #6b6b72;
      --accent:       #c9a96e;
      --accent-dim:   rgba(201, 169, 110, 0.10);
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      /* Subtle diagonal hatch in accent tone */
      background-image: repeating-linear-gradient(
        -45deg,
        rgba(201, 169, 110, 0.022) 0px,
        rgba(201, 169, 110, 0.022) 1px,
        transparent 1px,
        transparent 28px
      );
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 1.5rem 4rem;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.2s;
      position: relative;
    }

    /* Top accent bar */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 999;
    }

    /* Mountain ridge — two layers, bottom of viewport */
    .mountains {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial vignette behind content so text stays sharp over texture */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 780px 680px at 50% 38%, rgba(12,12,14,0.72) 0%, transparent 72%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes rise   { to { opacity: 1; transform: translateY(0); } }

    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    /* ── G Monogram ── */
    .g-mark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.6rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      line-height: 1;
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(201, 169, 110, 0.22);
      margin-bottom: 2.2rem;
      opacity: 0;
      animation: fadeIn 0.9s ease forwards;
      animation-delay: 0.25s;
      flex-shrink: 0;
    }

    /* ── Portrait ── */
    .portrait {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 1px solid rgba(201, 169, 110, 0.3);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeIn 0.9s ease forwards;
      animation-delay: 0.3s;
      transition: box-shadow 0.3s ease;
    }

    .portrait:hover {
      box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.2);
    }

    /* ── Wordmark ── */
    .wordmark {
      text-align: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(10px);
      animation: rise 0.9s ease forwards;
      animation-delay: 0.45s;
    }

    .wordmark h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 10vw, 4.5rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
    }

    .wordmark .role {
      margin-top: 0.7rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── Divider ── */
    .divider {
      width: 36px;
      height: 1px;
      background: rgba(201, 169, 110, 0.3);
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 0.85s;
    }

    /* ── Bio ── */
    .bio {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 1s;
    }

    .bio p {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--text-muted);
      letter-spacing: 0.01em;
      max-width: 500px;
    }

    .bio p strong { color: var(--text); font-weight: 400; }

    /* ── Work ── */
    .work {
      width: 100%;
      border: 1px solid var(--border);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 1.1s;
      background: rgba(12, 12, 14, 0.5);
      backdrop-filter: blur(2px);
    }

    .work-item {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 1.25rem;
      padding: 1.1rem 1.5rem;
      align-items: start;
    }

    .work-item + .work-item { border-top: 1px solid var(--border); }

    .work-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      padding-top: 0.2rem;
      opacity: 0.7;
    }

    .work-text {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text-muted);
      text-align: left;
    }

    .work-text strong { color: var(--text); font-weight: 400; }

    /* ── Links ── */
    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      width: 100%;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 1.2s;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid rgba(201, 169, 110, 0.15);
      background: rgba(12, 12, 14, 0.4);
      backdrop-filter: blur(2px);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      border-color: rgba(201, 169, 110, 0.45);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .btn svg {
      width: 13px;
      height: 13px;
      opacity: 0.55;
      flex-shrink: 0;
      transition: opacity 0.2s ease;
    }

    .btn:hover svg { opacity: 1; }

    /* ── Private nav ── */
    #priv-trigger {
      position: fixed;
      bottom: 20px;
      right: 24px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 9999;
      color: rgba(201, 169, 110, 0.35);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 26px;
      line-height: 1;
      user-select: none;
      transition: color 0.2s;
    }
    #priv-trigger:hover { color: rgba(201, 169, 110, 0.7); }

    #priv-menu {
      position: fixed;
      bottom: 52px;
      right: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 5px;
      z-index: 9999;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
      gap: 2px;
    }
    #priv-menu.open { display: flex; }

    #priv-menu a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 6px;
      color: var(--text-muted) !important;
      text-decoration: none !important;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }
    #priv-menu a:hover {
      background: var(--accent-dim);
      color: var(--accent) !important;
    }
    #priv-menu a span.priv-domain {
      font-size: 0.55rem;
      opacity: 0.4;
      letter-spacing: 0.1em;
    }
    #priv-menu-divider {
      height: 1px;
      background: var(--border);
      margin: 3px 6px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 4rem;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 1.35s;
    }

    .footer p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(201, 169, 110, 0.25);
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="vignette"></div>
  <svg class="mountains" viewBox="0 0 1440 220" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
    <!-- Back range — higher, more muted -->
    <path d="M0,138 C90,122 180,108 270,102 C360,96 450,112 540,104 C630,96 720,80 810,74 C900,68 990,76 1080,68 C1170,60 1260,66 1350,76 C1395,81 1420,86 1440,84 L1440,220 L0,220 Z"
      fill="rgba(201,169,110,0.038)"/>
    <!-- Front range — lower, slightly more present -->
    <path d="M0,182 C90,166 180,156 270,163 C360,170 450,155 540,160 C630,165 720,150 810,146 C900,142 990,150 1080,145 C1170,140 1260,148 1350,158 C1395,163 1420,168 1440,165 L1440,220 L0,220 Z"
      fill="rgba(201,169,110,0.055)"/>
  </svg>

  <div class="container">

    <!-- G Monogram -->
    <div class="g-mark" aria-hidden="true">G</div>

    <img src="photo.jpg" alt="Graham Harrell" class="portrait" onerror="this.style.display='none'">

    <div class="wordmark">
      <h1 id="name"></h1>
      <div class="role" id="role"></div>
    </div>

    <div class="divider"></div>

    <div class="bio"><p id="bio"></p></div>

    <div class="work" id="work"></div>

    <div class="links" id="links"></div>

    <div class="footer"><p id="footer"></p></div>

  </div>

  <!-- Private site nav -->
  <div id="priv-trigger">·</div>
  <div id="priv-menu">
    <a href="https://homerun.hrrll.com" target="_blank">
      <span>Home Run</span>
      <span class="priv-domain">homerun.hrrll.com</span>
    </a>
    <a href="https://meals.hrrll.com" target="_blank">
      <span>Meals</span>
      <span class="priv-domain">meals.hrrll.com</span>
    </a>
  </div>
  <script>
    (function() {
      var t = document.getElementById('priv-trigger');
      var m = document.getElementById('priv-menu');
      t.addEventListener('click', function(e) { e.stopPropagation(); m.classList.toggle('open'); });
      document.addEventListener('click', function() { m.classList.remove('open'); });
    })();
  </script>

  <script src="content.js"></script>
  <script>
    document.getElementById('name').textContent = CONTENT.name;
    document.getElementById('role').innerHTML   = CONTENT.role;
    document.getElementById('bio').innerHTML    = CONTENT.bio;
    document.getElementById('footer').innerHTML = CONTENT.footer;

    const work = document.getElementById('work');
    CONTENT.work.forEach(item => {
      work.innerHTML += `
        <div class="work-item">
          <div class="work-label">${item.label}</div>
          <div class="work-text">${item.text}</div>
        </div>`;
    });

    const links = document.getElementById('links');
    const l = CONTENT.links;
    links.innerHTML = `
      <a class="btn" href="${l.linkedin}" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/>
          <rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
        </svg>
        <span>LinkedIn</span>
      </a>
      <a class="btn" href="${l.github}" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/>
        </svg>
        <span>GitHub</span>
      </a>
      <a class="btn" href="mailto:${l.email}" style="grid-column: span 2;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
        <span>Get in Touch</span>
      </a>`;
  </script>
</body>
</html>
